<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: #070810;
      color: #dde2f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(160deg, #0d0f1c 0%, #0f111e 100%);
      border-bottom: 1px solid #1c2040;
      padding: 12px 14px 11px;
      display: flex;
      align-items: center;
      gap: 11px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #f0c040 35%, #ff7030 65%, transparent 100%);
    }
    .header-icon {
      font-size: 26px;
      filter: drop-shadow(0 0 14px rgba(240,192,64,0.55));
      flex-shrink: 0;
    }
    .header-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0c040;
      line-height: 1;
    }
    .header-sub {
      font-size: 9px;
      color: #3a4465;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .header-badge {
      margin-left: auto;
      font-size: 9px;
      color: #3a4465;
      border: 1px solid #1c2040;
      border-radius: 3px;
      padding: 3px 7px;
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }

    .platforms-wrap {
      padding: 10px 14px;
      border-bottom: 1px solid #0e1120;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .platform-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 9px;
      background: rgba(255,255,255,0.015);
      border: 1px solid #141830;
      border-radius: 5px;
    }
    .platform-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.07em;
      color: #505878;
    }
    .platform-name.p6   { color: #4db0ff; }
    .platform-name.ud   { color: #a878ff; }
    .platform-name.betr { color: #ff7a2b; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1e2444;
      flex-shrink: 0;
    }
    .dot.live {
      background: #00e87a;
      box-shadow: 0 0 7px rgba(0,232,122,0.6);
      animation: dotpulse 2.2s infinite;
    }
    @keyframes dotpulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .platform-right { display: flex; align-items: center; gap: 7px; }
    .fighter-count { font-size: 9px; color: #303858; letter-spacing: 0.06em; }
    .status-badge {
      font-size: 9px; font-weight: 600;
      padding: 2px 7px; border-radius: 3px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .status-ok   { background: rgba(0,232,122,0.1); color: #00e87a; border: 1px solid rgba(0,232,122,0.22); }
    .status-wait { background: rgba(30,36,68,0.3);  color: #303858; border: 1px solid #1a1e38; }

    .fighter-list { margin: 4px 8px 6px 22px; }
    .fighter-row-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 2px; border-bottom: 1px solid #0c0e1a;
    }
    .fighter-row-item:last-child { border: none; }
    .fighter-name { color: #7a85a0; font-size: 10.5px; }
    .fighter-line { color: #f0c040; font-weight: 600; font-size: 11.5px; }
    .timestamp { font-size: 9px; color: #252a45; margin: -2px 8px 4px 22px; }

    .section { padding: 10px 14px; border-bottom: 1px solid #0a0c18; }

    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 9px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.15em;
      color: #282e50;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: #0e1120;
    }

    .instructions {
      font-size: 10.5px; color: #464e6e; line-height: 1.75;
      background: rgba(0,0,0,0.2); border: 1px solid #111428;
      border-radius: 5px; padding: 9px 11px;
    }
    .instructions b { color: #7a85a0; }

    .btn {
      width: 100%; padding: 9px 14px;
      border-radius: 5px; border: none; cursor: pointer;
      font-family: 'Oswald', sans-serif; font-weight: 600;
      font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 6px;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn:active { transform: translateY(0px); }
    .btn-primary {
      background: linear-gradient(135deg, #f0c040 0%, #d89820 100%);
      color: #09080d;
    }
    .btn-secondary {
      background: rgba(77,176,255,0.08); color: #4db0ff;
      border: 1px solid rgba(77,176,255,0.28);
    }
    .btn-danger {
      background: rgba(255,58,80,0.07); color: #ff4a62;
      border: 1px solid rgba(255,58,80,0.22);
    }

    .copy-area {
      background: rgba(0,0,0,0.25); border: 1px solid #111428;
      border-radius: 5px; padding: 7px 9px;
      font-size: 9.5px; color: #363c58; word-break: break-all;
      max-height: 50px; overflow-y: auto; margin-bottom: 7px;
    }
    .copy-area::-webkit-scrollbar { width: 3px; }
    .copy-area::-webkit-scrollbar-thumb { background: #1a1e38; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🥊</div>
    <div>
      <div class="header-title">UFC Lines</div>
      <div class="header-sub">Pick6 · Underdog · Betr</div>
    </div>
    <div class="header-badge">FANTASY</div>
  </div>

  <div class="platforms-wrap" id="platforms-section"></div>

  <div class="section">
    <div class="section-label">How to capture</div>
    <div class="instructions">
      <b>1.</b> Open <b>underdogfantasy.com</b> → navigate to UFC picks<br>
      <b>2.</b> Open <b>pick6.draftkings.com</b> → navigate to UFC picks<br>
      <b>3.</b> Lines captured automatically on page load<br>
      <b>4.</b> Pick6 not captured? Click Retry below
    </div>
    <button class="btn btn-primary" id="open-analyzer-btn" style="margin-top:10px">🥊 Open Analyzer</button>
    <button class="btn" id="auto-fetch-btn" style="background:rgba(0,232,122,0.15);color:#00e87a;border:1px solid rgba(0,232,122,0.3);margin-top:4px;">⚡ Auto-Fetch Lines</button>
    <button class="btn btn-secondary" id="retry-pick6-btn">↺ Retry Pick6 Scan</button>
    <button class="btn btn-secondary" id="fetch-dk-tds-btn">📥 Fetch DK Sportsbook TDs</button>
    <button class="btn btn-danger" id="clear-btn">✕ Clear All Lines</button>
  </div>

  <div class="section">
    <div class="section-label">Export</div>
    <div class="copy-area" id="json-preview">Loading...</div>
    <button class="btn btn-primary" id="copy-btn">Copy Lines JSON</button>
  </div>

  <script type="module" src="dist/popup.js"></script>
</body>
</html>
